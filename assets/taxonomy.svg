<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<style>
text{font-family:Arial,Helvetica,sans-serif;fill:#1f2937}.title{font-size:34px;font-weight:700}.layer{font-size:22px;font-weight:700}.small{font-size:17px}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:2;rx:18}.blue{fill:#e0f2fe}.green{fill:#dcfce7}.orange{fill:#ffedd5}.purple{fill:#ede9fe}.arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
<rect width="1280" height="720" fill="#ffffff"/>
<text x="640" y="55" class="title" text-anchor="middle">Graph-Structured Small-Molecule Drug Discovery and Development</text>
<rect x="70" y="95" width="1140" height="105" class="box blue"/><text x="100" y="130" class="layer">Layer 1: Data Resources &amp; Benchmarks</text><text x="100" y="165" class="small">Molecule vaults · biological profiles · clinical/screening logs · benchmark suites</text>
<rect x="70" y="230" width="1140" height="115" class="box green"/><text x="100" y="265" class="layer">Layer 2: Multi-Modal Representation Learning</text><text x="100" y="302" class="small">1D/2D molecular graphs · 3D geometry · dynamics · electronic structure · omics · protein structure</text>
<rect x="70" y="375" width="1140" height="115" class="box orange"/><text x="100" y="410" class="layer">Layer 3: Task Formulation &amp; Problem Mapping</text><text x="100" y="447" class="small">Property prediction · cellular response mapping · target interaction modeling · generative design</text>
<rect x="70" y="520" width="1140" height="130" class="box purple"/><text x="100" y="555" class="layer">Layer 4: Downstream Application Paradigms</text>
<rect x="130" y="585" width="270" height="42" rx="12" fill="#fff"/><text x="265" y="612" class="small" text-anchor="middle">DTI/DTA · DRP/DPP</text>
<rect x="505" y="585" width="270" height="42" rx="12" fill="#fff"/><text x="640" y="612" class="small" text-anchor="middle">MPP · DDI</text>
<rect x="880" y="585" width="270" height="42" rx="12" fill="#fff"/><text x="1015" y="612" class="small" text-anchor="middle">MG · MO</text>
<line x1="640" y1="200" x2="640" y2="230" class="arrow"/><line x1="640" y1="345" x2="640" y2="375" class="arrow"/><line x1="640" y1="490" x2="640" y2="520" class="arrow"/>
</svg>